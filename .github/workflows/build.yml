name: Build OpenWrt for MT5000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone openwrt_mt5000
        run: |
          git clone https://github.com/gougou12138/openwrt_mt5000 openwrt

      - name: Setup build environment
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget curl

      - name: Replace feeds.conf.default
        run: |
          sed -i '/immortalwrt/d' feeds.conf.default
          cp feeds.conf.default openwrt/feeds.conf.default

      - name: Update & install feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Force replace libsodium with master version (1.0.20)
        working-directory: ./openwrt
        run: |
          rm -rf feeds/packages/libs/libsodium
          git clone https://github.com/openwrt/packages.git temp_pkgs
          cp -r temp_pkgs/libs/libsodium feeds/packages/libs/libsodium
          rm -rf temp_pkgs

      - name: Force replace lucihttp with latest master version
        working-directory: ./openwrt
        run: |
          rm -rf feeds/luci/contrib/package/lucihttp
          git clone https://github.com/jow-/lucihttp.git temp_lucihttp
          mkdir -p feeds/luci/contrib/package/lucihttp
          cp -r temp_lucihttp/* feeds/luci/contrib/package/lucihttp/
          rm -rf temp_lucihttp

      - name: Force replace rpcd-mod-luci with latest master version
        working-directory: ./openwrt
        run: |
          rm -rf feeds/luci/libs/rpcd-mod-luci
          git clone https://github.com/openwrt/luci.git temp_luci
          cp -r temp_luci/libs/rpcd-mod-luci feeds/luci/libs/rpcd-mod-luci
          rm -rf temp_luci

      - name: Copy custom config
        run: |
          cp .config openwrt/.config

      - name: Build
        working-directory: ./openwrt
        run: |
          make defconfig
          make -j$(nproc) V=s || make V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: mt5000-firmware
          path: openwrt/bin/targets/**/filogic/*
